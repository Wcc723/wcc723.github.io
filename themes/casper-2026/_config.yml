# ============================================
# casper-2026 主題設定
# 亮色：文人雜誌（明體）／暗色：終端機
# ============================================

# 預設模式：light | dark
default_mode: light

# 亮色模式小彩蛋：散步顏文字情侶（靠近會飄愛心；深色/手機/減少動態時自動關閉）
creatures:
  enable: true

# 暗色模式動態：顏文字雨 + 七彩邊框跑光 + 掃描掃掠（深色限定；reduced-motion 全關、雨僅桌機）
dark_fx:
  enable: true

# 導覽選單（label: url）
menu:
  首頁: /
  CSS: /tags/css/
  JavaScript: /tags/javascript/
  生活: /categories/life/
  封存: /archives/
  關於: /about/

# 作者資訊（側欄）
author:
  name: Wang Casper
  alias: 卡斯伯
  avatar_char: 卡
  avatar_img: /img/casper-avatar.webp  # avatar 改用圖片（取代「卡」字）
  bio: 前端工程師、教學者。在 Web 上寫筆記，自 2013 年至今，也在六角學院教授前端。
  since: 2013

# 我的著作（側欄）
book:
  title: JavaScript 面試力
  desc: 面試前的最後一哩路，補齊 JS 核心觀念。
  cover: /img/js-interview-cover.webp
  url: https://hex.school/byKCb
  label: 前往購買

# 社群（側欄）
social:
  Facebook:
    url: https://www.facebook.com/WccCasper
    note: 卡斯伯
  GitHub:
    url: https://github.com/wcc723
    note: wcc723
  YouTube:
    url: https://www.youtube.com/channel/UC-b2nGm0xLzic38Byti0VjA
    note: 六角學院
  RSS:
    url: /atom.xml
    note: 訂閱

# 站點標語
tagline: 前端，沒有極限
issue_start_year: 2012  # 期數從這年起算（vol = 今年 - 此值）

# 側欄顯示哪些區塊（依序）
widgets:
  - author
  - book
  - social
  - ad
  - tags

# Google AdSense（填入 client/slot 後才會輸出真實廣告，否則顯示版位佔位）
google_adsense:
  enable: true
  client: ca-pub-8296684122088055
  slot_rwd:        # 側欄廣告單元 ID（在 AdSense 後台建立後填入；空白則顯示佔位）
  slot_inline:     # 文章列表內嵌廣告單元 ID（空白則不輸出）

# 外掛
plugins:
  google_analytics_4: G-97433H4032
  facebook_pixel: '152520611964487'

# 留言（Facebook）
comment:
  facebook:
    enable: true
    app_id: '556473851118881'

# Open Graph
open_graph:
  fb_app_id: '556473851118881'
  fb_admins:
  twitter_id:

# Favicon
favicon: https://img.casper.tw/images/blog_logo.svg
